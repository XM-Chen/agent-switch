<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Agent Switch logo concept</title>
  <desc id="desc">Two routed streams cross through a central switch on a graphite rounded square.</desc>
  <defs>
    <linearGradient id="panel" x1="72" y1="48" x2="440" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#242932"/>
      <stop offset="1" stop-color="#12151B"/>
    </linearGradient>
    <linearGradient id="warm" x1="98" y1="132" x2="414" y2="378" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB44A"/>
      <stop offset="1" stop-color="#FF5D6C"/>
    </linearGradient>
    <linearGradient id="cool" x1="98" y1="378" x2="414" y2="132" gradientUnits="userSpaceOnUse">
      <stop stop-color="#42E8C6"/>
      <stop offset="1" stop-color="#69A7FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity=".32"/>
    </filter>
  </defs>

  <rect x="28" y="28" width="456" height="456" rx="112" fill="url(#panel)" filter="url(#shadow)"/>
  <rect x="29" y="29" width="454" height="454" rx="111" fill="none" stroke="#FFF" stroke-opacity=".08" stroke-width="2"/>

  <!-- Two routes enter from opposite sides, exchange lanes, and leave. -->
  <path d="M100 150h76c42 0 58 21 80 62l19 35c24 45 38 65 81 65h56"
        fill="none" stroke="url(#warm)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M100 362h76c42 0 58-21 80-62l19-35c24-45 38-65 81-65h56"
        fill="none" stroke="url(#cool)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow cuts make direction readable without adding fragile detail. -->
  <path d="M386 284l42 28-42 28z" fill="#FF5D6C"/>
  <path d="M386 172l42 28-42 28z" fill="#69A7FF"/>

  <!-- Central switch node. -->
  <circle cx="256" cy="256" r="34" fill="#F7F4ED"/>
  <circle cx="256" cy="256" r="13" fill="#1A1E26"/>
</svg>
